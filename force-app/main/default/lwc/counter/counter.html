<template>

    <lightning-card title="Counter" icon-name="custom:custom63">
        <div>      
            <p>Count: {count}</p>
            <lightning-button label="Increment" onclick={increment}></lightning-button>
            <template if:false={isZero}>
                <lightning-button label="Decrement" onclick={decrement}></lightning-button>
            </template>
        </div>
    </lightning-card>

</template>
