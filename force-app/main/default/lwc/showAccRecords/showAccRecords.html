<template>
    <lightning-card title="Show Accounts" icon-name="custom:custom14">
        <div>
            <template if:true={accounts}>
                <lightning-datatable
                    key-field="Id"
                    data={accounts}
                    columns={columns}
                ></lightning-datatable>
            </template>
            <template if:true={error}>
                <p>Error: {error.body.message}</p>
            </template>
        </div>
    </lightning-card>
</template>
